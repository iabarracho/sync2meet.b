services:
  api:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/sync2meet.db
      STORAGE_DIR: /data/storage
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - sync2meet_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_AUTH_ENABLED: "true"
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  sync2meet_data:
